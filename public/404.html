<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <title>404 — Page Not Found · Nikunj Prajapati</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      color: #e5e7eb;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .card {
      max-width: 520px;
    }

    .code {
      font-size: clamp(72px, 18vw, 144px);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(90deg, #60a5fa, #c084fc, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      color: #f9fafb;
    }

    p {
      color: #9ca3af;
      margin: 0 0 1.75rem;
      line-height: 1.5;
    }

    a.btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: #fff;
      border-radius: 9999px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }

    a.btn:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="card">
      <div class="code">404</div>
      <h1>This page took a wrong turn</h1>
      <p>The page you're looking for doesn't exist or has moved. Let's get you back to the portfolio.</p>
      <a class="btn" href="/">Back to Home</a>
    </div>
  </main>
</body>

</html>
